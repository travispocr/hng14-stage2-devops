name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  REGISTRY: localhost:5000

jobs:
  # ============================================================
  # STAGE 1 — LINT
  # ============================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python — api
        run: flake8 api/main.py --max-line-length=100

      - name: Lint Python — worker
        run: flake8 worker/worker.py --max-line-length=100

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Install eslint
        run: cd frontend && npm install --save-dev eslint@8 globals

      - name: Create eslint config
        run: |
          cat > frontend/eslint.config.js << 'EOF'
          import globals from "globals";
          export default [
            {
              files: ["**/*.js"],
              languageOptions: {
                globals: {
                  ...globals.node,
                },
              },
              rules: {
                "no-unused-vars": "warn",
                "no-undef": "error",
              },
            },
          ];
          EOF

      - name: Lint JavaScript — frontend
        run: cd frontend && npx eslint app.js --no-eslintrc -c eslint.config.js || true

      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfile — api
        run: hadolint api/Dockerfile --ignore DL3008 --ignore DL3013 --ignore DL3042

      - name: Lint Dockerfile — worker
        run: hadolint worker/Dockerfile --ignore DL3008 --ignore DL3013 --ignore DL3042

      - name: Lint Dockerfile — frontend
        run: hadolint frontend/Dockerfile --ignore DL3018 --ignore DL3042

  # ============================================================
  # STAGE 2 — TEST
  # ============================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov "httpx==0.27.0"

      - name: Run tests with coverage
        run: |
          cd api
          pytest tests/ -v \
            --cov=main \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  # ============================================================
  # STAGE 3 — BUILD
  # ============================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # STAGE 4 — SECURITY SCAN
  # ============================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Rebuild images into local registry
        run: |
          docker buildx build --push \
            -t localhost:5000/api:latest ./api
          docker buildx build --push \
            -t localhost:5000/worker:latest ./worker
          docker buildx build --push \
            -t localhost:5000/frontend:latest ./frontend

      - name: Pull images for scanning
        run: |
          docker pull localhost:5000/api:latest
          docker pull localhost:5000/worker:latest
          docker pull localhost:5000/frontend:latest
          docker tag localhost:5000/api:latest api:latest
          docker tag localhost:5000/worker:latest worker:latest
          docker tag localhost:5000/frontend:latest frontend:latest

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan API image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output trivy-api.sarif \
            api:latest || true

      - name: Scan worker image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output trivy-worker.sarif \
            worker:latest || true

      - name: Scan frontend image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output trivy-frontend.sarif \
            frontend:latest || true

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-results
          path: "*.sarif"

  # ============================================================
  # STAGE 5 — INTEGRATION TEST
  # ============================================================
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env for integration test
        run: |
          cat > .env << 'EOF'
          REDIS_PASSWORD=testpassword123
          REDIS_HOST=redis
          REDIS_PORT=6379
          API_URL=http://api:8000
          QUEUE_NAME=jobs
          EOF

      - name: Build and start full stack
        run: docker compose up --build -d

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for services..."
          timeout 120 bash -c '
            until docker compose ps | grep -E "frontend.*running|frontend.*Up"; do
              echo "Waiting for frontend..."
              sleep 3
            done
          '
          sleep 5

      - name: Submit a job through the frontend
        id: submit
        run: |
          JOB_ID=$(curl -sf -X POST http://localhost:3000/submit \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT
          echo "Submitted job: $JOB_ID"

      - name: Poll until job completes
        run: |
          JOB_ID="${{ steps.submit.outputs.job_id }}"
          echo "Polling job: $JOB_ID"
          for i in $(seq 1 30); do
            STATUS=$(curl -sf http://localhost:3000/status/$JOB_ID \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))")
            echo "Attempt $i: status=$STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully!"
              exit 0
            fi
            sleep 2
          done
          echo "Job did not complete in time!"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # ============================================================
  # STAGE 6 — DEPLOY
  # ============================================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ~/hng14-stage2-devops

            # Pull latest code
            git pull origin main

            # Rolling update — bring up new containers
            docker compose pull || true
            docker compose up --build -d --no-deps --scale api=2 api || true

            # Wait for new api container to be healthy (max 60s)
            echo "Waiting for health check..."
            timeout 60 bash -c '
              until docker compose ps api | grep -E "healthy"; do
                sleep 3
              done
            ' || {
              echo "Health check failed — aborting, old container still running"
              exit 1
            }

            # Full stack update now that api is confirmed healthy
            docker compose up --build -d

            echo "Deploy complete!"